    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['Outfit', 'sans-serif'],
              mono: ['Space Grotesk', 'monospace'],
            },
            colors: {
              glass: {
                100: 'rgba(255, 255, 255, 0.4)',
                200: 'rgba(255, 255, 255, 0.6)',
                300: 'rgba(255, 255, 255, 0.7)',
                border: 'rgba(255, 255, 255, 0.5)',
                highlight: 'rgba(255, 255, 255, 0.9)',
              },
              pastel: {
                pink: '#FFE5EC',
                purple: '#E0CCFF',
                blue: '#D6E4FF',
                green: '#D1F2D9',
                yellow: '#FFF4C4',
                text: '#2D2D44'
              }
            },
            boxShadow: {
              glass: '0 8px 32px 0 rgba(31, 38, 135, 0.07)',
              spatial: '0 20px 40px -10px rgba(0,0,0,0.1), 0 0 20px rgba(255,255,255,0.5) inset',
            }
          }
        }
      }
    </script>
    <style>
      html {
        scroll-behavior: smooth;
        scroll-padding-top: 20px; /* Reduced offset for static header */
      }
      body {
        background: radial-gradient(circle at 50% 0%, #f3f4f6 0%, #eef2ff 100%);
        color: #2D2D44;
        overflow-x: hidden;
      }
      /* Custom Scrollbar */
      ::-webkit-scrollbar {
        width: 8px;
      }
      ::-webkit-scrollbar-track {
        background: transparent;
      }
      ::-webkit-scrollbar-thumb {
        background: rgba(0, 0, 0, 0.1);
        border-radius: 10px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: rgba(0, 0, 0, 0.2);
      }
      .perspective-1000 {
        perspective: 1000px;
      }
    </style>
